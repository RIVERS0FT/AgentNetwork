# Grafana Dashboard 供应配置
# 自动加载 dashboards/ 目录下的所有 JSON Dashboard

apiVersion: 1

providers:
  - name: 'Agent Network'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
