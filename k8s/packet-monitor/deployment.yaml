# 数据包监控 Deployment + Service

apiVersion: apps/v1
kind: Deployment
metadata:
  name: packet-monitor
  namespace: agent-network
  labels:
    app: packet-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: packet-monitor
  template:
    metadata:
      labels:
        app: packet-monitor
    spec:
      containers:
      - name: packet-monitor
        image: agent-network:latest
        imagePullPolicy: IfNotPresent
        command: ["python", "packet_monitor_server.py"]
        ports:
        - containerPort: 9100
          name: http
        env:
        - name: PACKET_MONITOR_PORT
          value: "9100"
        - name: PACKET_BUFFER_SIZE
          value: "10000"
        readinessProbe:
          httpGet:
            path: /health
            port: 9100
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: packet-monitor
  namespace: agent-network
  labels:
    app: packet-monitor
spec:
  type: ClusterIP
  selector:
    app: packet-monitor
  ports:
  - port: 9100
    targetPort: 9100
    protocol: TCP
    name: http
