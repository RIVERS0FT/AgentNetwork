# Prometheus 监控 — 对应架构文档第七节

apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: agent-network
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        ports:
        - containerPort: 9090
          name: http
        args:
        - '--config.file=/etc/prometheus/prometheus.yml'
        - '--storage.tsdb.path=/prometheus'
        - '--web.enable-lifecycle'
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        - name: data
          mountPath: /prometheus
      volumes:
      - name: config
        configMap:
          name: prometheus-config
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: agent-network
  labels:
    app: prometheus
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: http
---
# Prometheus ConfigMap (K8s 版本 — 使用 K8s 服务发现)
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: agent-network
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'message-bus'
        static_configs:
          - targets: ['message-bus:9000']
        metrics_path: '/metrics'
      - job_name: 'packet-monitor'
        static_configs:
          - targets: ['packet-monitor:9100']
        metrics_path: '/metrics'
      - job_name: 'log-collector'
        static_configs:
          - targets: ['log-collector:9200']
        metrics_path: '/metrics'
      - job_name: 'agents'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [agent-network]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: '(scout|commander|analyst)'
          - source_labels: [__address__]
            action: replace
            regex: '([^:]+)(:\d+)?'
            replacement: '${1}:8000'
            target_label: __address__
        metrics_path: '/metrics'
