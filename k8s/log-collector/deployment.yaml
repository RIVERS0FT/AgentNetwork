# 日志收集器 Deployment + Service

apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-collector
  namespace: agent-network
  labels:
    app: log-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-collector
  template:
    metadata:
      labels:
        app: log-collector
    spec:
      containers:
      - name: log-collector
        image: agent-network:latest
        imagePullPolicy: IfNotPresent
        command: ["python", "log_collector_server.py"]
        ports:
        - containerPort: 9200
          name: http
        env:
        - name: LOG_COLLECTOR_PORT
          value: "9200"
        - name: LOG_BUFFER_SIZE
          value: "5000"
        - name: ES_ENABLED
          value: "false"
        envFrom:
        - configMapRef:
            name: agent-network-config
        readinessProbe:
          httpGet:
            path: /health
            port: 9200
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: log-collector
  namespace: agent-network
  labels:
    app: log-collector
spec:
  type: ClusterIP
  selector:
    app: log-collector
  ports:
  - port: 9200
    targetPort: 9200
    protocol: TCP
    name: http
