# Agent 部署 — 侦察兵 (可横向扩展)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: scout
  namespace: agent-network
  labels:
    app: scout
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scout
  template:
    metadata:
      labels:
        app: scout
    spec:
      containers:
      - name: scout
        image: agent-network:latest
        imagePullPolicy: IfNotPresent
        command: ["python", "agent_server.py"]
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: AGENT_ROLE
          value: "scout"
        - name: PORT
          value: "8000"
        - name: LLM_MODEL
          value: "deepseek-chat"
        envFrom:
        - configMapRef:
            name: agent-network-config
        - secretRef:
            name: agent-network-secrets
            optional: true
        readinessProbe:
          httpGet:
            path: /status
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /status
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
      # 每个 Pod 有唯一的 AGENT_ID (通过 Downward API)
      # 简化版本中，每个 Pod 使用 Pod 名作为 Agent 名
---
